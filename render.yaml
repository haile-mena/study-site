services:
  - type: web
    name: study-room
    runtime: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: ""
    disk:
      name: study-room-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1

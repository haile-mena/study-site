services:
  - type: web
    name: study-room
    runtime: node
    plan: free
    buildCommand: rm -rf node_modules server/node_modules client/node_modules && npm install --include=dev && cd server && npm install --include=dev && cd ../client && npm install --include=dev && npm run build
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: ""
